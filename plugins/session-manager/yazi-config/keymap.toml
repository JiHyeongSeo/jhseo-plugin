[[mgr.prepend_keymap]]
on = ["<C-s>"]
run = "shell '~/.config/yazi/cs-session-picker.sh' --block"
desc = "Claude 세션 선택"

[[mgr.prepend_keymap]]
on = ["<C-g>"]
run = "shell 'tmux display-popup -E -h 90% -w 90% -d \"$PWD\" lazygit' --block"
desc = "Lazygit (현재 디렉터리)"

[[mgr.prepend_keymap]]
on = ["<C-n>"]
run = "shell '~/.config/yazi/cs-new-session.sh' --block"
desc = "새 Claude 세션"

[[mgr.prepend_keymap]]
on = ["<C-f>"]
run = "shell ~/.config/yazi/fzf-search.sh --block"
desc = "fzf 파일 검색"

[[mgr.prepend_keymap]]
on = ["<C-q>"]
run = "shell 'tmux kill-session -t claude-browser' --block"
desc = "cs 종료"

[[mgr.prepend_keymap]]
on = ["<C-z>"]
run = "shell 'tmux detach-client' --block"
desc = "tmux detach"

